name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.1.0-rc.1)"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: instruct-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: instruct-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: instruct-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: instruct-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p instruct-cli

      - name: Prepare artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/instruct dist/${{ matrix.artifact }}

      - name: Prepare artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/instruct.exe" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag="${GITHUB_REF_NAME}"
            if [[ "${tag}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          fi

          if [[ "${tag}" != v* ]]; then
            echo "tag must start with 'v': ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: instruct-*
          merge-multiple: true
          path: dist

      - name: Generate checksums and Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist

          sha256sum dist/instruct-linux-x86_64 > dist/checksums.txt
          sha256sum dist/instruct-macos-x86_64 >> dist/checksums.txt
          sha256sum dist/instruct-macos-aarch64 >> dist/checksums.txt
          sha256sum dist/instruct-windows-x86_64.exe >> dist/checksums.txt

          linux_sha="$(awk '/instruct-linux-x86_64$/ { print $1 }' dist/checksums.txt)"
          macos_x86_sha="$(awk '/instruct-macos-x86_64$/ { print $1 }' dist/checksums.txt)"
          macos_arm_sha="$(awk '/instruct-macos-aarch64$/ { print $1 }' dist/checksums.txt)"

          owner_repo="${GITHUB_REPOSITORY}"
          owner="${owner_repo%%/*}"
          repo="${owner_repo##*/}"

          scripts/generate_homebrew_formula.sh \
            "${owner}" \
            "${repo}" \
            "${{ steps.meta.outputs.version }}" \
            "${macos_arm_sha}" \
            "${macos_x86_sha}" \
            "${linux_sha}" \
            "dist/instruct.rb"

      - name: Create release notes body
        shell: bash
        run: |
          {
            echo "## Release artifacts"
            echo
            echo "- instruct-linux-x86_64"
            echo "- instruct-macos-x86_64"
            echo "- instruct-macos-aarch64"
            echo "- instruct-windows-x86_64.exe"
            echo "- checksums.txt"
            echo "- instruct.rb (Homebrew formula with release checksums)"
            echo
            echo "## Verification"
            echo
            echo "Use checksums.txt to verify downloaded binaries."
            echo
            echo "## Changelog"
            echo
            echo "See CHANGELOG.md in this tag."
          } > dist/release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: dist/release-notes.md
          files: |
            dist/instruct-linux-x86_64
            dist/instruct-macos-x86_64
            dist/instruct-macos-aarch64
            dist/instruct-windows-x86_64.exe
            dist/checksums.txt
            dist/instruct.rb

  smoke:
    name: Smoke Published Binary (${{ matrix.os }})
    needs: publish
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    env:
      RELEASE_TAG: ${{ needs.publish.outputs.tag }}
    steps:
      - name: Download and run smoke test (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.platform }}" in
            linux)
              asset="instruct-linux-x86_64"
              ;;
            macos)
              if [[ "${RUNNER_ARCH}" == "ARM64" ]]; then
                asset="instruct-macos-aarch64"
              else
                asset="instruct-macos-x86_64"
              fi
              ;;
            *)
              echo "unexpected platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${asset}"

          for attempt in {1..10}; do
            if curl -fL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "${url}" \
              -o "instruct"; then
              break
            fi
            if [[ "${attempt}" == "10" ]]; then
              echo "failed to download release asset after retries: ${url}" >&2
              exit 1
            fi
            sleep 3
          done

          chmod +x "instruct"
          ./instruct --help
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and run smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "${env:GITHUB_SERVER_URL}/${env:GITHUB_REPOSITORY}/releases/download/${env:RELEASE_TAG}/instruct-windows-x86_64.exe"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/octet-stream"
          }

          $downloaded = $false
          for ($attempt = 1; $attempt -le 10; $attempt++) {
            try {
              Invoke-WebRequest -Uri $url -Headers $headers -OutFile "instruct.exe"
              $downloaded = $true
              break
            } catch {
              if ($attempt -eq 10) { throw }
              Start-Sleep -Seconds 3
            }
          }

          if (-not $downloaded) {
            throw "Failed to download asset from $url"
          }

          .\instruct.exe --help
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
